name: Build Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false" # evita intento de firmado
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # para electron-updater/github publish checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build Windows
        run: npm run dist -- --win --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: time-tracker-win
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
